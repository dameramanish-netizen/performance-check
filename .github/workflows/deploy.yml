name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  # Allows you to manually trigger the sync from the GitHub website if needed
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git variables for the virtual runner container
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push the main branch directly to Hugging Face Spaces
          # REPLACE 'YOUR_HF_USERNAME' AND 'YOUR_SPACE_NAME' WITH YOUR ACTUAL METRICS
          git push --force https://actions:$HF_TOKEN@huggingface.co/spaces/Manish0000007/performance-check main
